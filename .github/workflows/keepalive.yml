name: Keep-alive Supabase

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC diario
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Sources Table
        run: |
          # Consulta de la tabla 'sources' limitando a 1 resultado para minimizar tráfico
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY" \
            "$SUPABASE_URL/rest/v1/sources?select=id&limit=1")
          
          echo "Supabase responded with HTTP status: $STATUS"
          
          if [ "$STATUS" == "200" ]; then
            echo "SUCCESS: Conexión exitosa a la tabla 'sources'. Proyecto activo."
            exit 0
          else
            echo "WARNING: Se recibió un código $STATUS. Verifique Secrets y la URL."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}